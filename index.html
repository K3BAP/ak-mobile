<!doctype html>
<html lang="en" class="dark" data-theme="liquid-dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1"
    />
    <meta name="theme-color" content="#0a0e16" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AK" />
    <link rel="apple-touch-icon" href="/icon-180.png" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <title>AK Companion</title>
    <script>
      // Apply the saved theme before paint to avoid a flash of the default theme.
      (function () {
        try {
          var t = localStorage.getItem("ak-theme");
          if (t) document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
